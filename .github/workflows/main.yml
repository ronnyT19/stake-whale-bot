name: Stake Whale Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # pārbauda ik pēc 5 minūtēm
  workflow_dispatch:  # ļauj palaist manuāli

jobs:
  whale_alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
